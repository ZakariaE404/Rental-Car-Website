<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>prestigeAuto Location des Voitures - Location au Maroc</title>
    <link rel="icon" type="image/png" href="/assets/prestigeauto_logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        amber: {
                            50: 'var(--brand-50, #fffbeb)',
                            100: 'var(--brand-100, #fef3c7)',
                            200: 'var(--brand-200, #fde68a)',
                            300: 'var(--brand-300, #fcd34d)',
                            400: 'var(--brand-400, #fbbf24)',
                            500: 'var(--brand-color, #f59e0b)',
                            600: 'var(--brand-600, #d97706)',
                            700: 'var(--brand-700, #b45309)',
                            800: 'var(--brand-800, #92400e)',
                            900: 'var(--brand-900, #78350f)',
                            950: 'var(--brand-950, #451a03)',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            display: flex;
            width: fit-content;
            animation: marquee 30s linear infinite;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>

</html>
